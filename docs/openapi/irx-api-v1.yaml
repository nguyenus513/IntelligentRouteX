openapi: 3.0.3
info:
  title: IntelligentRouteX API
  version: v1
  description: Locked API contract for IRX production-demo MVP.
servers:
  - url: http://localhost:18116/api/v1
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: Success envelope }
  /jobs:
    post:
      summary: Create generic async job
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string }
      responses:
        '200': { description: Job envelope }
  /jobs/{jobId}:
    get:
      summary: Get job status
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Job envelope }
        '404': { description: NOT_FOUND error envelope }
  /jobs/{jobId}/result:
    get:
      summary: Get job result
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Result envelope }
  /jobs/{jobId}/cancel:
    post:
      summary: Cancel job
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Cancel envelope }
        '409': { description: CONFLICT error envelope }
  /jobs/{jobId}/events:
    get:
      summary: Job events
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Event page envelope }
  /jobs/{jobId}/artifacts:
    get:
      summary: Job artifacts
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Artifact list envelope }
  /static/dispatch:
    post:
      summary: Synchronous static dispatch
      responses:
        '200': { description: Static dispatch result envelope }
  /static/dispatch/jobs:
    post:
      summary: Async static dispatch
      responses:
        '200': { description: Job envelope }
  /static/dispatch/jobs/{jobId}:
    get:
      summary: Static job status
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Job envelope }
  /static/dispatch/jobs/{jobId}/result:
    get:
      summary: Static job result
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Result envelope }
  /live/start:
    post:
      summary: Start live rolling session
      responses:
        '200': { description: Live state envelope }
  /live/stop:
    post:
      summary: Stop live rolling session
      responses:
        '200': { description: Live state envelope }
  /live/state:
    get:
      summary: Live state
      responses:
        '200': { description: Live state envelope }
  /live/orders:
    post:
      summary: Add live order
      responses:
        '200': { description: Accepted envelope }
  /live/drivers/location:
    post:
      summary: Update driver location
      responses:
        '200': { description: Accepted envelope }
  /live/cycles/run-now:
    post:
      summary: Run live cycle immediately
      responses:
        '200': { description: Cycle envelope }
  /live/cycles/{cycleId}:
    get:
      summary: Cycle status
      parameters:
        - in: path
          name: cycleId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Cycle envelope }
  /live/cycles/{cycleId}/result:
    get:
      summary: Cycle result
      parameters:
        - in: path
          name: cycleId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Cycle result envelope }
  /live/events:
    get:
      summary: Live events
      responses:
        '200': { description: Event page envelope }
  /rescue/jobs:
    post:
      summary: Create rescue job
      responses:
        '200': { description: Rescue job envelope }
  /rescue/jobs/{jobId}:
    get:
      summary: Rescue job status
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Job envelope }
  /rescue/jobs/{jobId}/result:
    get:
      summary: Rescue result
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Rescue result envelope }
  /bigdata/batches:
    post:
      summary: Submit BigData-lite batch
      responses:
        '200': { description: Batch envelope }
  /bigdata/batches/{batchId}:
    get:
      summary: Batch status
      parameters:
        - in: path
          name: batchId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Batch envelope }
  /bigdata/batches/{batchId}/items:
    get:
      summary: Batch items page
      parameters:
        - in: path
          name: batchId
          required: true
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: size
          schema: { type: integer }
      responses:
        '200': { description: Page envelope }
  /bigdata/batches/{batchId}/requeue:
    post:
      summary: Requeue batch
      responses:
        '200': { description: Requeue envelope }
  /bigdata/dead-letter:
    get:
      summary: BigData dead-letter items
      responses:
        '200': { description: Dead-letter envelope }
  /bigdata/dead-letter/{itemId}/requeue:
    post:
      summary: Requeue dead-letter item
      parameters:
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Requeue envelope }
  /bigdata/metrics:
    get:
      summary: BigData metrics
      responses:
        '200': { description: Metrics envelope }
  /artifacts:
    get:
      summary: Artifact list
      responses:
        '200': { description: Artifact list envelope }
  /artifacts/{artifactId}:
    get:
      summary: Artifact metadata
      parameters:
        - in: path
          name: artifactId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Artifact envelope }
  /artifacts/{artifactId}/download:
    get:
      summary: Artifact download metadata
      responses:
        '200': { description: Artifact envelope }
  /events:
    get:
      summary: Global events
      responses:
        '200': { description: Event page envelope }
  /runtime/state:
    get:
      summary: Runtime state
      responses:
        '200': { description: Runtime state envelope }
  /runtime/queues:
    get:
      summary: Runtime queues
      responses:
        '200': { description: Queue metrics envelope }
  /runtime/workers:
    get:
      summary: Runtime workers
      responses:
        '200': { description: Worker metrics envelope }
  /metrics:
    get:
      summary: Runtime metrics
      responses:
        '200': { description: Metrics envelope }
components:
  schemas:
    ApiMeta:
      type: object
      properties:
        version: { type: string }
        timestamp: { type: string }
    ApiError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: array, items: { type: object } }
    ApiEnvelope:
      type: object
      properties:
        ok: { type: boolean }
        requestId: { type: string }
        data: { type: object }
        error: { $ref: '#/components/schemas/ApiError' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
