openapi: 3.0.3
info:
  title: IRX Production API
  version: v1.0.0-production-api-core
servers:
  - url: http://localhost:18116
security:
  - ApiKeyAuth: []
paths:
  /v1/health:
    get:
      summary: Health check
      responses:
        '200': { description: Backend health }
  /v1/version:
    get:
      summary: Version metadata
      responses:
        '200': { description: API version }
  /v1/dispatch/jobs:
    post:
      summary: Create static dispatch job
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DispatchJobRequest' }
      responses:
        '202': { description: Job accepted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /v1/dispatch/jobs/{jobId}:
    get:
      summary: Get static job status
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/JobId' } ]
      responses:
        '200': { description: Job status }
  /v1/dispatch/jobs/{jobId}/result:
    get:
      summary: Get static job result
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/JobId' } ]
      responses:
        '200': { description: Dispatch result }
  /v1/dispatch/jobs/{jobId}/artifacts:
    get:
      summary: List job artifacts
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/JobId' } ]
      responses:
        '200': { description: Artifacts }
  /v1/live/sessions:
    post:
      summary: Create live rolling dispatch session
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      responses:
        '201': { description: Session created }
  /v1/live/sessions/{sessionId}/orders:
    post:
      summary: Buffer live order
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/SessionId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      responses:
        '202': { description: Order buffered }
  /v1/live/sessions/{sessionId}/drivers/{driverId}/telemetry:
    post:
      summary: Update driver telemetry
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/SessionId' }, { name: driverId, in: path, required: true, schema: { type: string } } ]
      responses:
        '202': { description: Telemetry accepted }
  /v1/live/sessions/{sessionId}/cycles:
    post:
      summary: Run live rolling dispatch cycle
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/SessionId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      responses:
        '202': { description: Cycle completed }
  /v1/live/sessions/{sessionId}/state:
    get:
      summary: Get live session state
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/SessionId' } ]
      responses:
        '200': { description: Live state }
  /v1/live/sessions/{sessionId}/events:
    get:
      summary: Stream live session events
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/SessionId' } ]
      responses:
        '200': { description: Server-sent events }
  /v1/rescue/jobs:
    post:
      summary: Create rescue dispatch job
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      responses:
        '202': { description: Rescue job accepted }
  /v1/compare/jobs:
    post:
      summary: Compare IRX, OR-Tools, and VROOM on same scenario
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      responses:
        '202': { description: Compare job accepted }
  /v1/compare/jobs/{jobId}/result:
    get:
      summary: Get solver comparison result
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/JobId' } ]
      responses:
        '200': { description: Compare result }
  /v1/executions/{executionId}/timeline:
    get:
      summary: Get execution timeline
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { name: executionId, in: path, required: true, schema: { type: string } } ]
      responses:
        '200': { description: Timeline }
  /v1/executions/{executionId}/events:
    get:
      summary: Get execution events
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { name: executionId, in: path, required: true, schema: { type: string } } ]
      responses:
        '200': { description: Events }
  /v1/executions/{executionId}/result:
    get:
      summary: Get execution result
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { name: executionId, in: path, required: true, schema: { type: string } } ]
      responses:
        '200': { description: Result }
  /v1/artifacts/{artifactId}:
    get:
      summary: Get artifact metadata with tenant guard
      parameters: [ { $ref: '#/components/parameters/TenantId' }, { name: artifactId, in: path, required: true, schema: { type: string } } ]
      responses:
        '200': { description: Artifact }
        '403': { $ref: '#/components/responses/Forbidden' }
  /v1/admin/queues:
    get:
      summary: Queue metrics
      responses:
        '200': { description: Queue state }
  /v1/admin/workers:
    get:
      summary: Worker metrics
      responses:
        '200': { description: Worker state }
  /v1/admin/metrics:
    get:
      summary: Runtime metrics
      responses:
        '200': { description: Metrics }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
  parameters:
    TenantId: { name: X-Tenant-Id, in: header, required: true, schema: { type: string } }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
    JobId: { name: jobId, in: path, required: true, schema: { type: string } }
    SessionId: { name: sessionId, in: path, required: true, schema: { type: string } }
  responses:
    Unauthorized: { description: Missing or invalid API key }
    Forbidden: { description: Cross-tenant or scope denied }
  schemas:
    DispatchJobRequest:
      type: object
      properties:
        requestId: { type: string }
        tenantId: { type: string }
        profile: { type: string, example: QUALITY_SEEKING }
        datasetId: { type: string, example: raw-s }
        drivers: { type: array, items: { type: object } }
        orders: { type: array, items: { type: object } }
        adaptiveMl: { type: object }
        options: { type: object }
    ErrorResponse:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
