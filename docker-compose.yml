services:
  irx-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${IRX_API_PORT:-18116}:18116"
    environment:
      - VROOM_BIN=${VROOM_BIN:-tools/vroom/vroom-wsl.cmd}
      - IRX_API_KEY=${IRX_API_KEY:-demo-key}
      - IRX_BIGDATA_KAFKA_ENABLED=${IRX_BIGDATA_KAFKA_ENABLED:-false}
      - IRX_STREAMING_ENABLED=${IRX_STREAMING_ENABLED:-false}
      - IRX_KAFKA_BOOTSTRAP_SERVERS=${IRX_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - IRX_BIGDATA_POSTGRES_ENABLED=${IRX_BIGDATA_POSTGRES_ENABLED:-false}
      - IRX_BIGDATA_POSTGRES_URL=${IRX_BIGDATA_POSTGRES_URL:-jdbc:postgresql://postgres:5432/irx}
      - IRX_BIGDATA_POSTGRES_USER=${IRX_BIGDATA_POSTGRES_USER:-irx}
      - IRX_BIGDATA_POSTGRES_PASSWORD=${IRX_BIGDATA_POSTGRES_PASSWORD:-irx}
      - IRX_LIVE_KAFKA_ENABLED=${IRX_LIVE_KAFKA_ENABLED:-false}
      - IRX_LIVE_MAX_BUFFERED_ORDERS=${IRX_LIVE_MAX_BUFFERED_ORDERS:-10000}
      - IRX_LIVE_MAX_ORDERS_PER_CYCLE=${IRX_LIVE_MAX_ORDERS_PER_CYCLE:-100}
      - IRX_LIVE_MAX_WAIT_MS=${IRX_LIVE_MAX_WAIT_MS:-3000}
      - IRX_LIVE_FLUSH_INTERVAL_MS=${IRX_LIVE_FLUSH_INTERVAL_MS:-1000}
  redis:
    image: redis:7-alpine
    profiles: ["optional-persistent"]
  postgres:
    image: postgres:16-alpine
    profiles: ["optional-persistent"]
    environment:
      POSTGRES_PASSWORD: irx
      POSTGRES_USER: irx
      POSTGRES_DB: irx
    ports:
      - "${IRX_POSTGRES_PORT:-5432}:5432"
  minio:
    image: minio/minio:latest
    profiles: ["optional-object-store"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: irx
      MINIO_ROOT_PASSWORD: irx-demo-password
  kafka:
    image: apache/kafka:3.8.1
    profiles: ["optional-kafka"]
    ports:
      - "${IRX_KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${IRX_KAFKA_PORT:-9092}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
