spring:
  config:
    activate:
      on-profile: dispatch-v2-prod

routechain:
  dispatch-v2:
    enabled: true
    ml-enabled: true
    sidecar-required: true
    selector-ortools-enabled: true
    warm-start-enabled: true
    hot-start-enabled: true
    tomtom-enabled: true
    open-meteo-enabled: true
    weather:
      enabled: true
    traffic:
      enabled: true
    ml:
      tabular:
        enabled: true
      routefinder:
        enabled: true
      greedrl:
        enabled: true
      forecast:
        enabled: true
    feedback:
      storage-mode: FILE
      base-dir: data/dispatch-v2-feedback
    decision:
      mode: llm
      authoritative-stages:
        - pair-bundle
        - driver
        - route-critique
        - scenario
        - final-selection
      llm:
        base-url: https://r8cp2m4.9router.com/v1
        model: gpt-5.4
    performance:
      telemetry-enabled: true
      budget-enforcement-enabled: false
