spring:
  config:
    activate:
      on-profile: dispatch-v2-prod

routechain:
  bigdata-lite:
    max-batch-items: ${IRX_BIGDATA_MAX_BATCH_ITEMS:25000}
    max-queue-depth: ${IRX_BIGDATA_MAX_QUEUE_DEPTH:5000}
    max-lane-depth: ${IRX_BIGDATA_MAX_LANE_DEPTH:2000}
    worker-count: ${IRX_BIGDATA_WORKER_COUNT:4}
    chunk-size: ${IRX_BIGDATA_CHUNK_SIZE:1000}
    kafka:
      enabled: ${IRX_BIGDATA_KAFKA_ENABLED:false}
      fallback-to-local: ${IRX_BIGDATA_KAFKA_FALLBACK_TO_LOCAL:true}
      input-topic: ${IRX_BIGDATA_KAFKA_INPUT_TOPIC:irx.bigdata.chunks.v1}
      result-topic: ${IRX_BIGDATA_KAFKA_RESULT_TOPIC:irx.bigdata.results.v1}
      consumer-group-id: ${IRX_BIGDATA_KAFKA_CONSUMER_GROUP:irx-bigdata-lite}
      concurrency: ${IRX_BIGDATA_KAFKA_CONCURRENCY:4}
    postgres:
      enabled: ${IRX_BIGDATA_POSTGRES_ENABLED:false}
      url: ${IRX_BIGDATA_POSTGRES_URL:jdbc:postgresql://localhost:5432/irx}
      username: ${IRX_BIGDATA_POSTGRES_USER:irx}
      password: ${IRX_BIGDATA_POSTGRES_PASSWORD:irx}
    core:
      enabled: ${IRX_BIGDATA_CORE_ENABLED:false}
      synthetic-driver-count: ${IRX_BIGDATA_SYNTHETIC_DRIVER_COUNT:500}
      max-orders-per-chunk: ${IRX_BIGDATA_CORE_MAX_ORDERS_PER_CHUNK:1000}
      promised-eta-minutes: ${IRX_BIGDATA_PROMISED_ETA_MINUTES:45}
      timeout-ms: ${IRX_BIGDATA_CORE_TIMEOUT_MS:5000}
  live-kafka:
    enabled: ${IRX_LIVE_KAFKA_ENABLED:false}
    order-topic: ${IRX_LIVE_ORDER_TOPIC:irx.live.orders.v1}
    telemetry-topic: ${IRX_LIVE_TELEMETRY_TOPIC:irx.live.telemetry.v1}
    result-topic: ${IRX_LIVE_RESULT_TOPIC:irx.live.results.v1}
    consumer-group-id: ${IRX_LIVE_CONSUMER_GROUP:irx-live-dispatch}
    concurrency: ${IRX_LIVE_KAFKA_CONCURRENCY:4}
    max-buffered-orders: ${IRX_LIVE_MAX_BUFFERED_ORDERS:10000}
    max-orders-per-cycle: ${IRX_LIVE_MAX_ORDERS_PER_CYCLE:100}
    max-wait-ms: ${IRX_LIVE_MAX_WAIT_MS:3000}
    flush-interval-ms: ${IRX_LIVE_FLUSH_INTERVAL_MS:1000}
  dispatch-v2:
    enabled: true
    ml-enabled: true
    sidecar-required: true
    selector-ortools-enabled: true
    warm-start-enabled: true
    hot-start-enabled: true
    tomtom-enabled: true
    open-meteo-enabled: true
    weather:
      enabled: true
    traffic:
      enabled: true
    ml:
      tabular:
        enabled: true
      routefinder:
        enabled: true
      greedrl:
        enabled: true
      forecast:
        enabled: true
    feedback:
      storage-mode: FILE
      base-dir: data/dispatch-v2-feedback
    decision:
      mode: legacy
      authoritative-stages: []
      context-selection:
        dynamic-enabled: false
        tool-fetch-enabled: false
      llm:
        base-url: http://127.0.0.1:20128/v1
        model: cx/gpt-5.5
    performance:
      telemetry-enabled: true
      budget-enforcement-enabled: false
    streaming:
      enabled: ${IRX_STREAMING_ENABLED:false}
      bootstrap-servers: ${IRX_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      input-topic: ${IRX_KAFKA_INPUT_TOPIC:irx.dispatch.requests.v1}
      output-topic: ${IRX_KAFKA_OUTPUT_TOPIC:irx.dispatch.results.v1}
      dead-letter-topic: ${IRX_KAFKA_DLQ_TOPIC:irx.dispatch.dlq.v1}
      consumer-group-id: ${IRX_KAFKA_CONSUMER_GROUP:irx-dispatch-v2}
      client-id: ${IRX_KAFKA_CLIENT_ID:irx-dispatch-node}
      concurrency: ${IRX_KAFKA_CONCURRENCY:6}
      partitions: ${IRX_KAFKA_PARTITIONS:24}
      key-strategy: region-trace
      publish-training-trace: true
      file-sink-enabled: ${IRX_STREAMING_FILE_SINK_ENABLED:true}
      file-sink-base-dir: ${IRX_STREAMING_FILE_SINK_BASE_DIR:data/dispatch-v2-streaming}
      max-in-flight: ${IRX_STREAMING_MAX_IN_FLIGHT:128}
