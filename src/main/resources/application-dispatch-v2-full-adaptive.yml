spring:
  config:
    activate:
      on-profile: dispatch-v2-full-adaptive

routechain:
  dispatch-v2:
    enabled: true
    ml-enabled: true
    sidecar-required: false
    selector-ortools-enabled: true
    warm-start-enabled: true
    hot-start-enabled: true
    tomtom-enabled: true
    open-meteo-enabled: true
    weather:
      enabled: true
    traffic:
      enabled: true
    ml:
      tabular:
        enabled: true
      routefinder:
        enabled: true
      greedrl:
        enabled: true
      forecast:
        enabled: true
    candidate:
      route-proposal-budget:
        enabled: true
        full-adaptive-s-max-total: 256
        full-adaptive-m-max-total: 512
        max-drivers-per-bundle: 6
        max-anchors-per-bundle: 3
        max-alternatives-per-tuple: 2
        low-geometry-coverage-threshold: 0.75
        low-geometry-coverage-breadth-multiplier: 0.70
    feedback:
      storage-mode: FILE
      base-dir: data/dispatch-v2-feedback
    compute:
      adaptive:
        enabled: true
        profile-name: dispatch-v2-full-adaptive
        machine-profile: local
        require-worker-device-audit: true
        fail-open-when-worker-metadata-missing: false
        routefinder-max-tuples-per-dispatch: 4
        routefinder-eta-ambiguity-threshold-minutes: 1.5
        routefinder-stop-count-threshold: 3
        greedrl-min-working-orders: 4
        greedrl-min-accepted-boundary-orders: 1
        greedrl-support-spread-threshold: 0.12
        forecast-enabled-in-hot-path-by-default: false
        forecast-ambiguity-threshold-minutes: 1.8
        forecast-min-proposal-count: 2
    decision:
      mode: llm
      authoritative-stages:
        - pair-bundle
        - driver
        - route-critique
        - scenario
        - final-selection
      llm:
        base-url: http://127.0.0.1:20128/v1
        model: cx/gpt-5.5
    performance:
      telemetry-enabled: true
      budget-enforcement-enabled: false
