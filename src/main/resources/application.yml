spring:
  application:
    name: intelligent-route-x
management:
  endpoints:
    web:
      exposure:
        include: health,info

routechain:
  dispatch-v2:
    streaming:
      enabled: false
      broker-type: kafka
      bootstrap-servers: ${IRX_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      input-topic: ${IRX_KAFKA_INPUT_TOPIC:irx.dispatch.requests.v1}
      output-topic: ${IRX_KAFKA_OUTPUT_TOPIC:irx.dispatch.results.v1}
      dead-letter-topic: ${IRX_KAFKA_DLQ_TOPIC:irx.dispatch.dlq.v1}
      consumer-group-id: ${IRX_KAFKA_CONSUMER_GROUP:irx-dispatch-v2}
      client-id: ${IRX_KAFKA_CLIENT_ID:irx-dispatch-node}
      concurrency: ${IRX_KAFKA_CONCURRENCY:3}
      partitions: ${IRX_KAFKA_PARTITIONS:12}
      key-strategy: region-trace
      publish-training-trace: true
      file-sink-enabled: ${IRX_STREAMING_FILE_SINK_ENABLED:false}
      file-sink-base-dir: ${IRX_STREAMING_FILE_SINK_BASE_DIR:data/dispatch-v2-streaming}
      max-in-flight: ${IRX_STREAMING_MAX_IN_FLIGHT:64}
    enabled: false
    ml-enabled: false
    sidecar-required: false
    selector-ortools-enabled: false
    warm-start-enabled: true
    hot-start-enabled: true
    tomtom-enabled: false
    open-meteo-enabled: true
    tick: 30s
    weather:
      enabled: false
      base-url: http://127.0.0.1:8094
      connect-timeout: 75ms
      read-timeout: 180ms
      confidence-threshold: 0.45
      stale-signal-suppression-enabled: true
    traffic:
      enabled: false
      base-url: http://127.0.0.1:8095
      api-key: ${TOMTOM_API_KEY:}
      connect-timeout: 75ms
      read-timeout: 180ms
      confidence-threshold: 0.5
      refine-budget-per-tick: 8
      max-refined-legs-per-request: 1
    ml:
      model-manifest-path: ${IRX_MODEL_MANIFEST_PATH:services/models/model-manifest.yaml}
      tabular:
        enabled: false
        base-url: http://127.0.0.1:8091
        connect-timeout: 75ms
        read-timeout: 150ms
      routefinder:
        enabled: false
        base-url: http://127.0.0.1:8092
        connect-timeout: 75ms
        read-timeout: 180ms
        alternatives-timeout: 180ms
        refine-timeout: 150ms
        max-alternatives-per-driver-candidate: 2
      greedrl:
        enabled: false
        base-url: http://127.0.0.1:8093
        connect-timeout: 75ms
        read-timeout: 180ms
        bundle-timeout: 180ms
        sequence-timeout: 150ms
        max-orders-per-request: 8
        max-proposals-per-cluster: 3
      forecast:
        enabled: false
        base-url: http://127.0.0.1:8096
        connect-timeout: 75ms
        read-timeout: 180ms
    buffer:
      hold-window: 45s
    cluster:
      max-size: 24
    bundle:
      max-size: 5
      top-neighbors: 12
      beam-width: 16
    candidate:
      max-anchors: 3
      max-drivers: 8
      max-route-alternatives: 4
      route-proposal-budget:
        enabled: false
        local-lite-max-total: 128
        full-adaptive-s-max-total: 256
        full-adaptive-m-max-total: 512
        max-drivers-per-bundle: 4
        max-anchors-per-bundle: 2
        max-alternatives-per-tuple: 2
        low-geometry-coverage-threshold: 0.75
        low-geometry-coverage-breadth-multiplier: 0.70
    context:
      baseline-speed-kph: 22
      heavy-rain-multiplier: 1.28
      light-rain-multiplier: 1.07
      tomtom-refine-budget-per-tick: 8
      freshness:
        weather-max-age: 15m
        traffic-max-age: 10m
        forecast-max-age: 30m
      timeouts:
        eta-ml-timeout: 150ms
    pair:
      pickup-distance-km-threshold: 2.2
      ready-gap-minutes-threshold: 15
      drop-angle-diff-degrees-threshold: 55
      merge-eta-ratio-threshold: 1.25
      score-threshold: 0.45
      ml-timeout: 120ms
      max-candidate-neighbors-per-order: 12
      weather-tightened:
        pickup-distance-km-threshold: 1.4
        ready-gap-minutes-threshold: 10
        merge-eta-ratio-threshold: 1.15
    micro-cluster:
      time-bucket-minutes: 15
      split-score-threshold: 0.55
    boundary-expansion:
      min-support-score-threshold: 0.52
      max-boundary-orders-per-cluster: 2
      weather-tightened-support-threshold: 0.62
    scenario:
      weather-bad-eta-multiplier: 1.18
      traffic-bad-eta-multiplier: 1.22
      merchant-delay-minutes: 6
      driver-drift-penalty: 0.08
      pickup-queue-penalty: 0.06
      forecast:
        zone-burst-threshold: 0.58
        demand-shift-threshold: 0.57
        post-drop-shift-threshold: 0.55
        confidence-threshold: 0.55
    selector:
      greedy-repair-enabled: true
      repair-pass-limit: 1
      fallback-penalty: 0.03
      ortools:
        timeout: 150ms
        objective-scale-factor: 1000
    feedback:
      decision-log-enabled: true
      snapshot-enabled: true
      replay-enabled: true
      storage-mode: IN_MEMORY
      base-dir: build/dispatch-v2-feedback
    warm-hot-start:
      load-latest-snapshot-on-boot: true
    performance:
      telemetry-enabled: true
      budget-enforcement-enabled: false
